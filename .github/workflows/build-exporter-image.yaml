name: Building kube-events-exporter image

on:
  push:
    branches:
      - 'master'
      - 'release-*'
    tags:
      - 'v*'
    paths:
      - ".github/workflows/build-exporter-image.yaml"
      - "cmd/exporter/**"
      - "hack/**"
      - "pkg/**"
      - "Makefile"
env:
  REPO_EXPORTER: 'hub.kubesphere.com.cn/wiztelemetry'

jobs:
  exporter-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Build Image for kube-events-exporter
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image for kube-events-exporter
        env:
          DOCKER_USERNAME: ${{ secrets.REGISTRY_USER }}
          DOCKER_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login -u '${{ secrets.REGISTRY_USER }}' --password-stdin hub.kubesphere.com.cn
          make cross-build-exporter -e REPO_EXPORTER=${{ env.REPO_EXPORTER }}/kube-events-exporter